<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chavruta.AI · בית מדרש — זכוכית חמה</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<script>
tailwind.config = { theme: { extend: {
  colors: {
    ink:'#1c1a17', tekhelet:'#002045', 'tekhelet-2':'#1a365d', indigo:'#3a5ba0',
    gold:'#8a6510', 'gold-soft':'#b88f2e', cream:'#fdfbf6', 'cream-2':'#f6f1e7', line:'#ece2cf',
  },
  fontFamily: { serif:['"Frank Ruhl Libre"','serif'], sans:['Heebo','sans-serif'] },
}}}
</script>
<style>
  body{ background:
    radial-gradient(120% 80% at 85% -10%, #e7eefc 0%, transparent 45%),
    radial-gradient(100% 70% at 0% 110%, #faf2dd 0%, transparent 50%), #fdfbf6; }
  ::-webkit-scrollbar{width:8px} ::-webkit-scrollbar-thumb{background:#e3d8c2;border-radius:8px}
  .glass{ background:rgba(255,255,255,.55); backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,.7);
    box-shadow:0 1px 2px rgba(28,26,23,.04), 0 16px 40px -24px rgba(26,54,93,.35); }
  .grad{ background:linear-gradient(135deg,#002045,#3a5ba0); }
  .material-symbols-outlined{ font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20; vertical-align:middle; }
  .he{ direction:rtl } .en{ direction:ltr }
</style>
</head>
<body class="font-sans text-ink h-screen overflow-hidden">
<div class="flex flex-col h-screen">
  <header class="h-[70px] flex items-center justify-between px-8 shrink-0">
    <div class="flex items-center gap-3">
      <div class="h-11 w-11 rounded-2xl grad grid place-items-center text-white font-serif text-xl font-black shadow-lg shadow-tekhelet/20">ח</div>
      <h1 class="font-serif text-2xl font-bold text-tekhelet">חברותא</h1>
    </div>
    <div class="flex items-center gap-2">
      <button id="langBtn" class="px-4 py-2 rounded-full glass text-ink/70 text-sm">עברית · EN</button>
      <button class="h-10 w-10 rounded-full glass grid place-items-center" title="הגדרות"><span class="material-symbols-outlined">settings</span></button>
      <div class="h-10 w-10 rounded-full grad grid place-items-center text-white font-bold">א</div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden px-4 pb-4 gap-4">
    <!-- Sessions -->
    <aside class="w-72 shrink-0 glass rounded-[28px] p-4 flex flex-col">
      <button id="newBtn" class="w-full grad text-white py-3 rounded-2xl font-serif text-lg font-bold hover:opacity-95 transition shadow-lg shadow-tekhelet/20">+ דיון חדש</button>
      <p class="text-[11px] tracking-widest text-ink/40 font-bold uppercase mt-6 mb-2 px-2">שיחות אחרונות</p>
      <nav id="sessions" class="flex flex-col gap-1.5 overflow-y-auto"></nav>
      <div class="mt-auto pt-3 text-ink/50 text-sm flex flex-col gap-1">
        <a class="px-3 py-2 rounded-xl hover:bg-white/50 cursor-pointer">⚙ הגדרות</a>
        <a class="px-3 py-2 rounded-xl hover:bg-white/50 cursor-pointer">? תמיכה</a>
      </div>
    </aside>

    <!-- Chat -->
    <main class="flex-1 glass rounded-[28px] flex flex-col overflow-hidden">
      <div class="h-16 px-7 flex items-center justify-between border-b border-white/60">
        <div class="min-w-0">
          <h2 class="font-serif text-lg font-bold text-tekhelet">דיון עם החברותא</h2>
          <p id="subtitle" class="text-[10px] tracking-widest text-gold font-bold uppercase truncate">בבא מציעא ב׳ ע״א</p>
        </div>
        <div id="intentSeg" class="flex bg-white/50 rounded-full p-1 text-xs font-semibold">
          <button data-intent="lesson" class="px-3 py-1.5 rounded-full grad text-white">שיעור</button>
          <button data-intent="explain" class="px-3 py-1.5 rounded-full text-ink/60">הסבר</button>
          <button data-intent="qa" class="px-3 py-1.5 rounded-full text-ink/60">שאלה</button>
        </div>
      </div>

      <div id="messages" class="flex-1 overflow-y-auto px-8 py-8 flex flex-col gap-6 max-w-2xl mx-auto w-full"></div>

      <div class="p-5">
        <form id="composer" class="max-w-2xl mx-auto flex items-center gap-2 glass rounded-full px-3 py-2 focus-within:ring-2 focus-within:ring-indigo/30">
          <span id="goalLabel" class="text-gold font-bold text-sm px-3 py-1.5 rounded-full select-none whitespace-nowrap">🎯 שיעור</span>
          <input id="input" class="flex-1 bg-transparent outline-none font-serif text-[16px] placeholder:text-ink/35" placeholder="שאל את החברותא…" autocomplete="off">
          <button id="sendBtn" type="submit" class="h-10 w-10 rounded-full grad text-white grid place-items-center hover:opacity-95 shadow-lg shadow-tekhelet/20 disabled:opacity-40">↑</button>
        </form>
        <p class="text-center text-[10px] text-ink/35 mt-2.5">נבנה ביראת שמיים · אינו פסיקת הלכה למעשה</p>
      </div>
    </main>

    <!-- Sources -->
    <aside class="w-80 shrink-0 glass rounded-[28px] flex flex-col overflow-hidden">
      <div class="p-5 border-b border-white/60"><h3 class="font-serif text-xl font-bold text-tekhelet">מקורות קשורים</h3></div>
      <div id="sources" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>
      <div class="p-4"><button class="w-full py-2.5 rounded-full grad text-white font-bold text-sm hover:opacity-95 transition shadow-lg shadow-tekhelet/20">+ הוסף מקור</button></div>
    </aside>
  </div>
</div>

<script>
// ─── Chavruta.AI — live wiring (vanilla JS over the FastAPI backend) ────────────
const API = '/api';
const state = { sessions: [], activeId: null, messages: [], intent: 'lesson', lang: 'he', loading: false };

const $ = sel => document.querySelector(sel);
const el = (html) => { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; };
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function api(path, opts) {
  const res = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!res.ok) throw new Error('API ' + res.status + ': ' + await res.text());
  return res.status === 204 ? null : res.json();
}

// ── Demo fallback (shown only if the backend is unreachable) ───────────────────
const DEMO_SESSIONS = [
  { id: 'demo-1', first_q: 'סוגיית שניים אוחזין', created_at: new Date().toISOString() },
  { id: 'demo-2', first_q: 'דיני שומרים — בבא מציעא', created_at: new Date().toISOString() },
  { id: 'demo-3', first_q: 'מצוות תלמוד תורה לרמב"ם', created_at: new Date().toISOString() },
  { id: 'demo-4', first_q: 'קניין חצר וארבע אמות', created_at: new Date().toISOString() },
];
const DEMO_MESSAGES = [
  { role:'assistant', text:'המשנה פותחת ב"שניים אוחזין בטלית" — לא "מחזיקים" אלא "אוחזין", המלמד על חזקה מיידית. נעמיק במחלוקת "זה אומר כולה שלי"?',
    citations:[{ ref:'בבא מציעא ב׳ ע״א', text_he:'"שניים אוחזין בטלית, זה אומר אני מצאתיה…"', commentator:'Gemara', deep_link:'https://www.sefaria.org/Bava_Metzia.2a' }] },
  { role:'user', text:'איך רש"י מסביר את הצורך בשבועה? למה לא "כל דאלים גבר"?', citations:[] },
  { role:'assistant', text:'רש"י מבאר שהשבועה היא תקנת חכמים — שלא יתפוס כל אחד בטלית חברו. שבועת "נשבעין ונוטלין".',
    citations:[
      { ref:'רש"י על ב׳ ע״א', text_he:'"תקנת חכמים היא שיהו נשבעין, כדי שלא יהיה כל אחד תוקף…"', commentator:'Rashi', deep_link:'https://www.sefaria.org/Rashi_on_Bava_Metzia.2a' },
      { ref:'בבא מציעא ב׳ ע״א', text_he:'"שניים אוחזין בטלית…"', commentator:'Gemara', deep_link:'https://www.sefaria.org/Bava_Metzia.2a' },
      { ref:'רמב"ם, הל׳ גזילה ט׳', text_he:'דיני חלוקת אבידה בשניים אוחזין…', commentator:'Rambam', deep_link:'https://www.sefaria.org/Mishneh_Torah,_Robbery_and_Lost_Property.9' },
    ] },
];
let demoMode = false;

// ── Helpers ────────────────────────────────────────────────────────────────────
function commentatorTag(c) {
  const s = (c.commentator || '').toLowerCase();
  if (s.includes('rashi') || s.includes('רש')) return 'רש"י';
  if (s.includes('rambam') || s.includes('רמב')) return 'רמב"ם';
  if (s.includes('tosafot') || s.includes('תוספ')) return 'תוספות';
  if (s.includes('gemara') || s.includes('גמרא') || s.includes('talmud')) return 'גמרא';
  return c.commentator || 'מקור';
}
function isHe(t){ const h=(t.match(/[א-ת]/g)||[]).length, e=(t.match(/[a-zA-Z]/g)||[]).length; return h>=e; }

// ── Renderers (markup identical to the approved mockup) ─────────────────────────
function renderSessions() {
  const nav = $('#sessions'); nav.innerHTML = '';
  if (!state.sessions.length) {
    nav.appendChild(el('<p class="text-ink/40 text-xs text-center mt-6">אין שיחות עדיין</p>'));
    return;
  }
  for (const s of state.sessions) {
    const active = s.id === state.activeId;
    const item = el('<a class="group px-4 py-3 rounded-2xl transition cursor-pointer flex items-center gap-2 ' +
      (active ? 'bg-white/70 font-bold text-tekhelet shadow-sm ring-1 ring-tekhelet/10' : 'hover:bg-white/50 text-ink/65') + '">' +
        '<span class="flex-1 truncate">' + esc(s.first_q) + '</span>' +
        '<span class="del opacity-0 group-hover:opacity-100 text-ink/40 hover:text-red-500 text-xs shrink-0" title="מחק">✕</span>' +
      '</a>');
    item.addEventListener('click', e => {
      if (e.target.classList.contains('del')) { e.stopPropagation(); deleteSession(s.id); return; }
      selectSession(s.id);
    });
    nav.appendChild(item);
  }
}

function bubble(m) {
  const tags = (m.role === 'assistant' ? [...new Set((m.citations||[]).map(commentatorTag))].slice(0,4) : []);
  const tagHtml = tags.length ? '<div class="mt-3 flex flex-wrap gap-2">' +
    tags.map(t => '<span class="text-[10px] font-bold px-2.5 py-1 rounded-full bg-tekhelet/8 text-tekhelet">' + esc(t) + '</span>').join('') + '</div>' : '';
  const dir = isHe(m.text) ? 'he' : 'en';
  if (m.role === 'user') {
    return el('<div class="flex gap-3.5 flex-row-reverse">' +
      '<div class="h-9 w-9 rounded-2xl grad grid place-items-center text-white font-bold shrink-0">א</div>' +
      '<div class="grad text-white rounded-3xl rounded-tl-md p-5 shadow-lg shadow-tekhelet/20 max-w-[80%]">' +
        '<p class="font-serif text-[17px] leading-loose ' + dir + '" style="white-space:pre-wrap">' + esc(m.text) + '</p>' +
      '</div></div>');
  }
  return el('<div class="flex gap-3.5">' +
    '<div class="h-9 w-9 rounded-2xl bg-white/80 grid place-items-center text-tekhelet font-serif font-black shrink-0 shadow-sm">ח</div>' +
    '<div class="bg-white/70 rounded-3xl rounded-tr-md p-5 shadow-sm ring-1 ring-white/60">' +
      '<p class="font-serif text-[18px] leading-loose ' + dir + '" style="white-space:pre-wrap">' + esc(m.text) + '</p>' + tagHtml +
    '</div></div>');
}

function renderMessages() {
  const box = $('#messages'); box.innerHTML = '';
  if (!state.messages.length && !state.loading) {
    box.appendChild(el('<div class="flex flex-col items-center justify-center my-auto text-center gap-4 py-10">' +
      '<div class="h-14 w-14 rounded-2xl grad grid place-items-center text-2xl shadow-lg shadow-tekhelet/20">🕍</div>' +
      '<h1 class="font-serif text-xl font-bold text-tekhelet">חברותא AI</h1>' +
      '<p class="text-ink/55 text-sm max-w-md leading-relaxed font-serif p-4 glass rounded-2xl">ברוך הבא ללימוד. שאל שאלה על הסוגיא והחברותא תשיב ממקורות מצוטטים.</p>' +
    '</div>'));
    return;
  }
  state.messages.forEach(m => box.appendChild(bubble(m)));
  if (state.loading) {
    box.appendChild(el('<div class="flex gap-3.5">' +
      '<div class="h-9 w-9 rounded-2xl bg-white/80 grid place-items-center text-tekhelet font-serif font-black shrink-0 shadow-sm">ח</div>' +
      '<div class="bg-white/70 rounded-3xl rounded-tr-md p-5 shadow-sm ring-1 ring-white/60 flex gap-1.5 items-center">' +
        '<span class="h-2 w-2 bg-gold rounded-full animate-bounce"></span>' +
        '<span class="h-2 w-2 bg-gold rounded-full animate-bounce" style="animation-delay:.15s"></span>' +
        '<span class="h-2 w-2 bg-gold rounded-full animate-bounce" style="animation-delay:.3s"></span>' +
      '</div></div>'));
  }
  box.scrollTop = box.scrollHeight;
}

function renderSources() {
  const box = $('#sources'); box.innerHTML = '';
  const last = [...state.messages].reverse().find(m => m.role === 'assistant' && (m.citations||[]).length);
  const cits = last ? last.citations : [];
  if (!cits.length) {
    box.appendChild(el('<p class="text-ink/40 text-sm text-center mt-10">המקורות יופיעו כאן</p>'));
    return;
  }
  cits.forEach((c, i) => {
    const active = i === 0;
    const snippet = state.lang === 'en' ? (c.text_en || c.text_he) : (c.text_he || c.text_en);
    const href = c.deep_link || ('https://www.sefaria.org/' + encodeURIComponent(c.ref));
    box.appendChild(el('<a href="' + esc(href) + '" target="_blank" rel="noopener" class="block rounded-2xl p-4 shadow-sm transition cursor-pointer ' +
      (active ? 'bg-white/80 ring-2 ring-gold/40' : 'bg-white/60 hover:ring-2 hover:ring-gold/30') + '">' +
      '<p class="text-[10px] font-black tracking-widest text-gold uppercase">' + (active ? '★ ' : '') + esc(commentatorTag(c)) + '</p>' +
      '<h4 class="font-serif text-lg font-bold text-tekhelet mt-1">' + esc(c.ref) + '</h4>' +
      '<p class="text-sm text-ink/65 mt-1 font-serif leading-relaxed">' + esc(snippet || '') + '</p>' +
    '</a>'));
  });
}

function render() { renderSessions(); renderMessages(); renderSources(); }

// ── Actions ─────────────────────────────────────────────────────────────────────
async function loadSessions(autoSelect) {
  try {
    state.sessions = await api('/sessions');
    if (autoSelect && state.sessions.length) await selectSession(state.sessions[0].id);
    else render();
  } catch (e) {
    demoMode = true;
    state.sessions = DEMO_SESSIONS; state.activeId = DEMO_SESSIONS[0].id; state.messages = DEMO_MESSAGES;
    render();
  }
}
async function selectSession(id) {
  state.activeId = id;
  if (demoMode) { state.messages = DEMO_MESSAGES; render(); return; }
  try { state.messages = await api('/sessions/' + id + '/messages'); }
  catch { state.messages = []; }
  const s = state.sessions.find(x => x.id === id);
  $('#subtitle').textContent = s ? s.first_q : '';
  render();
}
function newDiscussion() { state.activeId = null; state.messages = []; $('#subtitle').textContent = ''; render(); $('#input').focus(); }
async function deleteSession(id) {
  if (!demoMode) { try { await api('/sessions/' + id, { method:'DELETE' }); } catch (e) {} }
  state.sessions = state.sessions.filter(s => s.id !== id);
  if (state.activeId === id) { state.activeId = null; state.messages = []; }
  render();
}
async function send(text) {
  state.messages.push({ role:'user', text, citations:[] });
  state.loading = true; render();
  const body = JSON.stringify({ question: text, intent: state.intent, lang: state.lang });
  try {
    if (demoMode) throw new Error('demo');
    const sid = state.activeId;
    if (!sid) {
      // New session: backend creates it + runs the first query, then we reload the
      // canonical messages (robust regardless of the create-response shape).
      const r = await api('/sessions', { method:'POST', body });
      state.activeId = r.id;
      state.sessions.unshift({ id:r.id, first_q:r.first_q, created_at:r.created_at });
      $('#subtitle').textContent = r.first_q;
      state.messages = await api('/sessions/' + r.id + '/messages');
    } else {
      const result = await api('/sessions/' + sid + '/query', { method:'POST', body });
      state.messages.push({ role:'assistant', text:result.answer, citations:result.citations||[], caveats:result.caveats||[], grounded:result.grounded });
    }
  } catch (e) {
    state.messages.push({ role:'assistant', text: demoMode
      ? '‹ מצב הדגמה — השרת אינו מחובר. הפעל את ה-API (uvicorn / docker) כדי לקבל תשובות אמיתיות. ›'
      : ('שגיאה בפנייה לשרת: ' + e.message), citations:[] });
  } finally {
    state.loading = false; render();
  }
}

// ── Wire up controls ─────────────────────────────────────────────────────────────
$('#composer').addEventListener('submit', e => {
  e.preventDefault();
  const v = $('#input').value.trim();
  if (!v || state.loading) return;
  $('#input').value = '';
  send(v);
});
$('#newBtn').addEventListener('click', newDiscussion);
$('#langBtn').addEventListener('click', () => {
  state.lang = state.lang === 'he' ? 'en' : 'he';
  document.documentElement.dir = state.lang === 'he' ? 'rtl' : 'ltr';
  $('#langBtn').textContent = state.lang === 'he' ? 'עברית · EN' : 'EN · עברית';
  renderSources();
});
const INTENT_LABEL = { lesson:'🎯 שיעור', explain:'🎯 הסבר', qa:'🎯 שאלה' };
$('#intentSeg').addEventListener('click', e => {
  const btn = e.target.closest('[data-intent]'); if (!btn) return;
  state.intent = btn.dataset.intent;
  [...$('#intentSeg').children].forEach(b => {
    b.className = 'px-3 py-1.5 rounded-full ' + (b === btn ? 'grad text-white' : 'text-ink/60');
  });
  $('#goalLabel').textContent = INTENT_LABEL[state.intent];
});

// ── Boot ──────────────────────────────────────────────────────────────────────
loadSessions(true);
</script>
</body>
</html>
