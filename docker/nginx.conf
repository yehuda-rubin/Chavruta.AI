# Chavruta.AI — frontend (static SPA) + reverse proxy to the FastAPI backend.
# Mirrors the Vite dev proxy: /api/* is forwarded to the api service with the
# /api prefix stripped (backend routes live at /sessions, /health, …).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API reverse proxy. Trailing slash on proxy_pass strips the /api/ prefix.
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM generation (Nebius) can take a while — be patient.
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # SPA fallback — every non-asset route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
