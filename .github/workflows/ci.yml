name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install deps (CPU torch; the fake-backed tests need torch+fastapi for app.api imports)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install fastapi uvicorn pydantic
      - name: Fake-backed test suite (no models / no Qdrant server needed)
        run: pytest tests/unit tests/contract tests/integration tests/eval -q
        env:
          CHAVRUTA_LLM_BACKEND: bridge
  # The eval harness (scripts/run_eval.py) needs a live Qdrant + embedder and is run manually /
  # via workflow_dispatch on a self-hosted runner — not part of the push gate.
