# Chavruta.AI — full local stack in Docker.
#
# ⚠️ PREREQUISITE — the corpus is NOT included and NOT downloaded automatically.
#    A fresh `docker compose up` gives you an EMPTY Qdrant. The API will start, but every question
#    returns nothing. Load the corpus first (this takes a long time and a lot of disk — see
#    docs/CORPUS.md), against the running qdrant service:
#
#       docker compose up -d qdrant
#       python scripts/load_all_indexes.py          # downloads the 15 index tiers from HuggingFace
#       python scripts/create_payload_indexes.py    # REQUIRED — without it, ref anchoring times out
#
#    `/ready` tells you the truth: it returns 503 with a reason until the collection has points.
#
#   docker compose up --build         # start the whole app (api + web)
#   open http://localhost:5173        # the UI
#   docker compose down               # stop (conversation DB + caches persist)
#
# Architecture (the LLM runs on Nebius; everything else is local containers):
#   web (nginx)  ──/api──▶  api (FastAPI + bge-m3, CPU)  ──▶  Nebius (Qwen, generation)
#                                       │
#                                       └─▶ qdrant (server, named volume `qdrant_storage`)
#
# Generation uses the Nebius API — put NEBIUS_API_KEY in a .env file beside this one (copy from
# .env.example). Without it the API now fails fast at boot with an explicit message rather than
# 500-ing on the first question.
#
# Retrieval runs against the `qdrant` SERVER below (CHAVRUTA_QDRANT_MODE=server), storing into the
# named volume `qdrant_storage`. The old embedded-store layout under ./data/qdrant is gone.

services:
  # ── Backend: FastAPI RAG query service ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.endpoint
    container_name: chavruta-api
    restart: unless-stopped
    environment:
      # Local deployment, but generation is delegated to Nebius.
      CHAVRUTA_PROFILE: local
      CHAVRUTA_EMBEDDING_DEVICE: cpu

      # Retrieval — HYBRID against the Qdrant SERVER (449k-point dense+sparse index).
      # Embedded mode cannot do hybrid at this scale (brute force → timeouts).
      CHAVRUTA_QDRANT_MODE: server
      CHAVRUTA_QDRANT_URL: http://qdrant:6333
      CHAVRUTA_COLLECTION: chavruta
      CHAVRUTA_HYBRID: "true"
      CHAVRUTA_RERANK: "false"
      CHAVRUTA_RELEVANCE_THRESHOLD: "0.0"

      # Generation — Nebius Token Factory (OpenAI-compatible). Qwen3-235B-Instruct is the model the
      # prompts are tuned and verified against; it is NON-thinking, so it does not hit the empty-content
      # problem the older Qwen3 "thinking" models had under a tight token budget. Keep this in sync with
      # .env.example and scripts/serve.ps1 — a different model here silently changes answer quality.
      CHAVRUTA_LLM_BACKEND: nebius
      CHAVRUTA_LLM_MODEL: ${CHAVRUTA_LLM_MODEL:-Qwen/Qwen3-235B-A22B-Instruct-2507}
      CHAVRUTA_LLM_BASE_URL: ${CHAVRUTA_LLM_BASE_URL:-https://api.studio.nebius.ai/v1}
      CHAVRUTA_LLM_API_KEY: ${NEBIUS_API_KEY:-}

      # Chat history — persisted to the named volume below.
      CHAVRUTA_DB_PATH: /app-data/chavruta.db
    volumes:
      - chavruta_db:/app-data             # SQLite conversation history (persists)
      - hf_cache:/root/.cache/huggingface # bge-m3 / model cache
    depends_on:
      - qdrant
    expose:
      - "8080"
    ports:
      - "8080:8080"                       # exposed for direct debugging (optional)
    healthcheck:
      # /ready, not /health: readiness asserts the corpus is actually loaded, so `web` will not start
      # in front of an API that answers every question with nothing.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/ready').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 120s                  # bge-m3 load + first warm-up
      retries: 3

  # ── Frontend: React SPA served by nginx, proxying /api → api:8080 ────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: chavruta-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"                         # open http://localhost:5173

  # ── OPTIONAL: standalone Qdrant SERVER (profile "server") ────────────────────
  # Use instead of the embedded index for real HNSW indexes / concurrency.
  # Start with:  docker compose --profile server up -d qdrant
  # Then set on `api`:  CHAVRUTA_QDRANT_MODE=server, CHAVRUTA_QDRANT_URL=http://qdrant:6333
  # (the server starts EMPTY — run the `ingest` service once to populate it).
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chavruta-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  # ── OPTIONAL: one-shot corpus ingestion into the Qdrant SERVER (profile "ingest")
  # Embeds the prebuilt corpus (no Sefaria refetch) and loads it into the server.
  # Long-running on CPU. Start with:  docker compose --profile ingest run --rm ingest
  ingest:
    build:
      context: .
      dockerfile: docker/Dockerfile.job
    profiles: ["ingest"]
    environment:
      CHAVRUTA_PROFILE: local
      CHAVRUTA_EMBEDDING_DEVICE: cpu
      CHAVRUTA_QDRANT_MODE: server
      CHAVRUTA_QDRANT_URL: http://qdrant:6333
      CHAVRUTA_COLLECTION: chavruta
      INGEST_CHUNKS_PATH: /data/processed/all_chunks_full.json
    volumes:
      - ./data:/data                      # prebuilt corpus (read) — see data/processed/

volumes:
  chavruta_db:
  hf_cache:
  qdrant_storage:
