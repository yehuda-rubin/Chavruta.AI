# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
id: tefila
title: "תפילה וברכות — תבנית"
genre: tefila-berachot
description: >
  שיעור על תפילה, ברכה או פרק בסידור, המבקש להבין את הנוסח לעומק ולהתפלל בכוונה. תחילה
  הנוסח עצמו, אחר כך מקורו (גמרא, אנשי כנסת הגדולה, ראשונים), פירוש המילים והמבנה, ההלכות
  הנוגעות (דינים, זמנים, כוונה מעכבת), ולבסוף הכוונה והמשמעות הפנימית. הדגש על חיבור בין
  הבנת המילים לעבודת הלב.
when_to_use: >
  בחר תבנית זו כאשר נושא השיעור הוא תפילה, ברכה, או קטע מן הסידור והמחזור — שמונה עשרה,
  קריאת שמע, ברכות השחר, ברכת המזון, הלל, קדיש, פסוקי דזמרה; כאשר המטרה היא הבנת פשר
  הנוסח וכוונת הלב, ולא רק דיני התפילה היבשים.
keywords: [תפילה, ברכות, סידור, שמונה עשרה, עמידה, קריאת שמע, ברכת המזון, הלל, קדיש, פסוקי דזמרה, נוסח, כוונה, פירוש התפילה, עבודה שבלב, אנשי כנסת הגדולה]
structure: "הנוסח → מקורו → פירוש המילים והמבנה → הלכות התפילה → כוונה ומשמעות"
files:
