# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
id: aggada
title: "אגדה ומדרש — תבנית"
genre: aggada-midrash
audience: yeshiva
grade_band: beit-midrash
age_range: "16+ — בני ישיבה / לומדי בית מדרש"
mode: lesson
description: >
  שיעור על מאמר אגדה או מדרש חז"ל, המבקש לחשוף את עומקו הרעיוני מעבר לפשט התמוה. תחילה
  לשון האגדה/המדרש, אחר כך הקושי (מדוע חז"ל אמרו כך — הרי זה תמוה כפשוטו), פירושי חז"ל
  (רש"י, מהרש"א, עין יעקב, המהר"ל בספרי האגדה), העמקה ברעיון שמאחורי הדימוי, ולבסוף
  המסר לחיים. הדגש על "אין מקרא יוצא מידי פשוטו" מול העומק — האגדה כרובד רעיוני עמוק.
when_to_use: >
  בחר תבנית זו כאשר נושא השיעור הוא מאמר אגדה, מדרש, או סיפור חז"ל (אגדתא) הדורש פירוש —
  כשהפשט תמוה או מוקשה, וצריך לחשוף את הרעיון שמאחוריו; כאשר המקור הוא מדרש רבה, אגדות
  הש"ס, עין יעקב, או פרקי אבות; וכאשר המטרה היא רעיון ומסר, לא הלכה או פשט המקרא.
keywords: [אגדה, מדרש, אגדתא, מדרש רבה, עין יעקב, מהרש"א, מהר"ל, פרקי אבות, סיפורי חז"ל, דרש, רעיון, משל ונמשל, פירוש האגדה, חידושי אגדות]
structure: "לשון האגדה → הקושי (הפשט תמוה) → פירושי חז\"ל → העמקה ברעיון → המסר לחיים"
files:
