# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
id: machshava
title: "מחשבה ואמונה — תבנית"
genre: machshava-emuna
description: >
  שיעור במחשבת ישראל ואמונה, הבנוי סביב שאלה רעיונית או קיומית ולא סביב פסק הלכה. תחילה
  ניסוח חד של השאלה, אחר כך המקורות המכוננים (תנ"ך וחז"ל), עמדות הראשונים (רמב"ם, כוזרי,
  מהר"ל, רס"ג), פיתוח והעמקה (הגות מאוחרת ומודרנית), ולבסוף יישום קיומי — מה השאלה תובעת
  מחיי המאמין. הדגש על ליבון רעיוני וברור עמדות, לא על הכרעה מעשית.
when_to_use: >
  בחר תבנית זו כאשר נושא השיעור הוא שאלה במחשבה, אמונה או השקפה — כגון בחירה חופשית וידיעת
  ה', טעמי המצוות, שכר ועונש, אמונה ומדע, צלם אלוקים, השגחה; כאשר הלימוד עוסק ברעיון ולא
  בהלכה; וכאשר המטרה היא הבנה והכרעה רעיונית או נגיעה קיומית.
keywords: [מחשבה, אמונה, השקפה, בחירה חופשית, ידיעה, השגחה, טעמי המצוות, רמב"ם, כוזרי, מהר"ל, שכר ועונש, אמונה ומדע, צלם אלוקים, פילוסופיה יהודית]
structure: "ניסוח השאלה → מקורות מכוננים (תנ\"ך/חז\"ל) → עמדות הראשונים → פיתוח והעמקה → יישום קיומי"
