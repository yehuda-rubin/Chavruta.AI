# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
id: mussar
title: "מוסר ומידות — תבנית"
genre: mussar-midot
description: >
  שיעור מוסר על מידה או תכונת נפש, שמטרתו שינוי והתעלות אישית ולא ידע בלבד. תחילה הכרת
  המידה והגדרתה, אחר כך חומרתה או מעלתה (מחז"ל וספרי הקבלה), עמדות ספרי המוסר והראשונים
  (רמב"ם הל' דעות, מסילת ישרים, אורחות צדיקים, חובות הלבבות, פלא יועץ), הדרך לתיקון
  (הדרך האמצעית ועצות מעשיות), וקבלה למעשה. הדגש רגשי-מעשי: לגעת בלב ולהוליד שינוי.
when_to_use: >
  בחר תבנית זו כאשר נושא השיעור הוא מידה, תכונת נפש או עבודת המידות — כגון כעס, גאווה,
  ענווה, אמת, כבוד, שמחה, זהירות, ביטחון, לשון הרע; כאשר המטרה היא התעוררות ותיקון המידות
  ולא בירור הלכתי או רעיוני; וכאשר השיעור אמור להסתיים בקבלה מעשית.
keywords: [מוסר, מידות, כעס, גאווה, ענווה, אמת, שמחה, זהירות, ביטחון, לשון הרע, מסילת ישרים, אורחות צדיקים, חובות הלבבות, רמב"ם דעות, תיקון המידות, עבודת ה']
structure: "הכרת המידה → חומרתה/מעלתה → ספרי המוסר והראשונים → הדרך לתיקון → קבלה למעשה"
