# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
id: parasha
title: "פרשת שבוע — תבנית"
genre: parasha-tanakh
audience: yeshiva
grade_band: beit-midrash
age_range: "16+ — בני ישיבה / לומדי בית מדרש"
mode: lesson
description: >
  שיעור על פרשת השבוע או על סוגיה בתנ"ך, הבנוי סביב הפסוקים: תחילה פשוטו של מקרא (רש"י,
  רשב"ם, אבן עזרא), אחר כך קושי או שאלה בכתוב, תשובות הפשטנים, מדרשי חז"ל, מחלוקת המפרשים
  (רמב"ן, ספורנו, אור החיים), ולבסוף הרעיון המרכזי והמסר. אין כאן סולם הלכתי אלא לימוד פרשני
  שמצמיח רעיון.
when_to_use: >
  בחר תבנית זו כאשר נושא השיעור הוא פרשת שבוע, סיפור מקראי, פסוק או פרשייה בתנ"ך; כאשר הלב
  הוא פירוש הכתובים (פשט ודרש) והמתח בין המפרשים; וכאשר המטרה היא רעיון או מסר הצומח מן
  הפרשה, ולא פסק הלכה.
keywords: [פרשת שבוע, תנ"ך, תורה, פסוקים, רש"י, רמב"ן, מדרש, פשט, דרש, מפרשים, ספורנו, אבן עזרא, רעיון, מסר, בראשית, שמות]
structure: "פסוקים → פשוטו של מקרא → קושי בכתוב → מדרש חז\"ל → מחלוקת המפרשים → רעיון ומסר"
files:
