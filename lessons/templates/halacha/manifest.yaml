# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
id: halacha
title: "הלכה למעשה — תבנית פסיקה"
genre: halacha-lemaaseh
description: >
  שיעור הלכה מעשית היוצא משאלה קונקרטית מן החיים ומוליך אל הכרעה למעשה. תחילה המקרה
  והשאלה, אחר כך שורש הדין (משנה/גמרא), עמדות הראשונים, פסק השולחן ערוך ונושאי כליו (מגן
  אברהם, ט"ז, משנה ברורה), ופוסקי זמננו (אגרות משה, יביע אומר, ציץ אליעזר, פניני הלכה),
  ולבסוף ההכרעה למעשה על סייגיה. הדגש על מה עושים בפועל, לא על ליבון עיוני.
when_to_use: >
  בחר תבנית זו כאשר נושא השיעור הוא שאלה הלכתית מעשית ("האם מותר…", "כיצד נוהגים…") הדורשת
  הכרעה למעשה; כאשר יש מחלוקת פוסקים והכרח להגיע לפסק; וכאשר הקהל רוצה לדעת מה לעשות
  בפועל. שונה מתבנית עיון תלמודי — כאן הפסק במרכז, לא הלמדנות.
keywords: [הלכה למעשה, פסק, שאלה מעשית, שולחן ערוך, משנה ברורה, מגן אברהם, אגרות משה, יביע אומר, פניני הלכה, פוסקים, מותר ואסור, כשרות, שבת, נדה, מנהג, הכרעה]
structure: "המקרה והשאלה → שורש הדין (משנה/גמרא) → ראשונים → שו\"ע ונו\"כ → פוסקי זמננו → הכרעה למעשה"
