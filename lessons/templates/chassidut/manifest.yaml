# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
id: chassidut
title: "חסידות — תבנית"
genre: chassidut
description: >
  שיעור בתורת החסידות, הבנוי סביב מאמר חסידי או מושג בעבודת ה'. תחילה נקודת המוצא (פסוק או
  מאמר חז"ל שהמאמר נסמך עליו), אחר כך השאלה או הקושי הפנימי, המאמר החסידי עצמו (בעל שם טוב,
  המגיד ממזריטש, תניא, נועם אלימלך, שפת אמת, ר' צדוק, ליקוטי מוהר"ן), העמקה במושג
  (דבקות, ביטול, אתערותא דלתתא, נקודה פנימית), ולבסוף העבודה למעשה. הדגש על עבודת הנפש
  ופנימיות התורה, לא על הלכה או פשט.
when_to_use: >
  בחר תבנית זו כאשר נושא השיעור הוא מאמר חסידי, מושג בעבודת ה', או פירוש פנימי לפסוק —
  דבקות, ביטול היש, אמונה, שמחה, התבודדות, אתערותא דלתתא, נקודה פנימית, מסירות נפש; כאשר
  הלימוד נשען על ספרי חסידות ומבקש לפעול בנפש, ולא על ניתוח הלכתי או פשט המקרא.
keywords: [חסידות, מאמר, בעל שם טוב, מגיד, תניא, נועם אלימלך, שפת אמת, ליקוטי מוהרן, ר' צדוק, דבקות, ביטול, אמונה, שמחה, התבודדות, פנימיות התורה, עבודת ה', נקודה פנימית]
structure: "נקודת המוצא (פסוק/מאמר) → השאלה הפנימית → המאמר החסידי → העמקה במושג → העבודה למעשה"
files:
  source_sheet: TEMPLATE_source_sheet.md
  lesson_flow: TEMPLATE_lesson_flow.md
  full_lesson: TEMPLATE_full_lesson.md
example_topics: ["ביטול היש", "עבדו את ה' בשמחה", "דבקות בתפילה", "אתערותא דלתתא"]
