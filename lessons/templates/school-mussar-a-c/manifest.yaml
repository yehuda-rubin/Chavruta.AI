id: school-mussar-a-c
title: "מוסר ומידות — כיתות א–ג (יסודי צעיר)"
genre: school-mussar
audience: school
subject: mussar
grade_band: a-c
age_range: "א–ג — גיל 6–9 (יסודי צעיר)"
mode: lesson
description: >
  שיעור מוסר ומידות לתלמידי בית ספר בכיתות א–ג (גיל 6–9, יסודי צעיר). עבודת המידות — הכרת המידה, מקורה, סיפור/משל ותיקון מעשי. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: חשיבה קונקרטית וקשב קצר; לומדים דרך סיפור, תמונה, תנועה ומשחק. רעיון אחד לשיעור. משך משוער 30 דק'.
when_to_use: >
  בחר תבנית זו כאשר מכינים שיעור מוסר ומידות לתלמידי בית ספר בכיתות א–ג (גיל 6–9) — שיעור כיתתי מובנה ומותאם־גיל (ולא שיעור עיון לבני ישיבה). מתאים לרמת יסודי צעיר: שאלות זכירה והבנה בסיסית (מה קרה? מי? היכן?) ושאלת חיבור אישית פשוטה.
