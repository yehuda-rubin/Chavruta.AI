description: >
  שיעור חסידות ופנימיות לתלמידי בית ספר בכיתות ד–ו (גיל 9–12, יסודי בוגר). מושג בעבודת ה' — שאלה פנימית, מאמר, והעבודה למעשה. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: תחילת חשיבה מופשטת; יכולים להחזיק מקור + פירוש אחד ולהשוות שתי דעות בפשטות. משך משוער 45 דק'. (הערה: ז'אנר זה נלמד בדרך כלל בשכבות בוגרות יותר; זו גרסה מותאמת ומופשטת לגיל 9–12.)
when_to_use: >
  בחר תבנית זו כאשר מכינים שיעור חסידות ופנימיות לתלמידי בית ספר בכיתות ד–ו (גיל 9–12) — שיעור כיתתי מובנה ומותאם־גיל (ולא שיעור עיון לבני ישיבה). מתאים לרמת יסודי בוגר: שאלות הבנה ויישום (למה? מה ההבדל? מה היה קורה אילו…?) והשוואה בין שתי דעות.
