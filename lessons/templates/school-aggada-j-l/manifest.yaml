description: >
  שיעור אגדה ומדרש לתלמידי בית ספר בכיתות י–יב (גיל 15–18, תיכון). אגדתא / מדרש — הקושי, פירושי חז"ל, והרעיון והמסר. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: חשיבה כמעט־בוגרת; ניתוח מבוסס־מקור, טיעון מתמשך ומיומנות טקסט ראשוני; גשר אל עיון בית־מדרש — עדיין עם פיגומים ורלוונטיות. משך משוער 45–60 דק'.
when_to_use: >
  בחר תבנית זו כאשר מכינים שיעור אגדה ומדרש לתלמידי בית ספר בכיתות י–יב (גיל 15–18) — שיעור כיתתי מובנה ומותאם־גיל (ולא שיעור עיון לבני ישיבה). מתאים לרמת תיכון: שאלות ניתוח, סינתזה והערכה ברמה גבוהה; חקירה עקרונית ושורשי מחלוקת.
