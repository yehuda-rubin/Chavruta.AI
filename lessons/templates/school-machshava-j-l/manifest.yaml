description: >
  שיעור מחשבה ואמונה לתלמידי בית ספר בכיתות י–יב (גיל 15–18, תיכון). רעיון אמוני/השקפי — שאלה, מקורות, עמדות ויישום. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: חשיבה כמעט־בוגרת; ניתוח מבוסס־מקור, טיעון מתמשך ומיומנות טקסט ראשוני; גשר אל עיון בית־מדרש — עדיין עם פיגומים ורלוונטיות. משך משוער 45–60 דק'.
when_to_use: >
  בחר תבנית זו כאשר מכינים שיעור מחשבה ואמונה לתלמידי בית ספר בכיתות י–יב (גיל 15–18) — שיעור כיתתי מובנה ומותאם־גיל (ולא שיעור עיון לבני ישיבה). מתאים לרמת תיכון: שאלות ניתוח, סינתזה והערכה ברמה גבוהה; חקירה עקרונית ושורשי מחלוקת.
