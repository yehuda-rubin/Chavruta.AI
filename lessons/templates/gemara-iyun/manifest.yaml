# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
id: gemara-iyun
title: "עיון תלמודי — תבנית למדנות"
genre: gemara-iyun
description: >
  שיעור עיון תלמודי (למדנות) המעמיק בסוגיה: העמדת הסוגיה, קושיה או חקירה למדנית, שיטות
  הראשונים (רש"י, תוספות, רמב"ן, ריטב"א, רא"ש), ובעיקר האחרונים והחקירות שלהם (קצות החושן,
  ר' חיים הלוי, שערי יושר, אבן האזל), עד להכרעת החקירה ונפקא מינה. הדגש על הבנת שני צדדי
  הסברא ("תרי צדדי בחקירה") ולא על פסק הלכה.
when_to_use: >
  בחר תבנית זו כאשר השיעור הוא עיון מעמיק בסוגיית גמרא, עם חקירה למדנית (שני צדדים להבין
  דין), מחלוקת ראשונים עקרונית, או ניתוח בסגנון האחרונים (חקירת "גברא/חפצא", "דין/גדר",
  "סיבה/סימן"); כאשר המטרה היא עומק ההבנה והסברא, לא ההכרעה למעשה.
keywords: [עיון, למדנות, סוגיה, חקירה, גברא חפצא, תוספות, ריטב"א, קצות החושן, ר' חיים, שערי יושר, אחרונים, סברא, שני צדדים, נפקא מינה, ישיבה, עיון תלמודי]
structure: "העמדת הסוגיה → הקושי/החקירה → שיטות הראשונים → האחרונים והחקירה → הכרעה ונפקא מינה"
