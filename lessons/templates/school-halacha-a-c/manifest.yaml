description: >
  שיעור הלכה ומצוות לתלמידי בית ספר בכיתות א–ג (גיל 6–9, יסודי צעיר). הלכה מעשית — מהמצווה והמקור אל היישום בחיי היום־יום. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: חשיבה קונקרטית וקשב קצר; לומדים דרך סיפור, תמונה, תנועה ומשחק. רעיון אחד לשיעור. משך משוער 30 דק'.
when_to_use: >
  בחר תבנית זו כאשר מכינים שיעור הלכה ומצוות לתלמידי בית ספר בכיתות א–ג (גיל 6–9) — שיעור כיתתי מובנה ומותאם־גיל (ולא שיעור עיון לבני ישיבה). מתאים לרמת יסודי צעיר: שאלות זכירה והבנה בסיסית (מה קרה? מי? היכן?) ושאלת חיבור אישית פשוטה.
