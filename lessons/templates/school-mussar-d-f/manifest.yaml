  שיעור מוסר ומידות לתלמידי בית ספר בכיתות ד–ו (גיל 9–12, יסודי בוגר). עבודת המידות — הכרת המידה, מקורה, סיפור/משל ותיקון מעשי. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: תחילת חשיבה מופשטת; יכולים להחזיק מקור + פירוש אחד ולהשוות שתי דעות בפשטות. משך משוער 45 דק'.
