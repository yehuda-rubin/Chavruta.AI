grade_band: j-l
age_range: "י–יב — גיל 15–18 (תיכון)"
mode: lesson
description: >
  שיעור סוגיה / גמרא כללי לתלמידי בית ספר בכיתות י–יב (גיל 15–18, תיכון). לימוד סוגיה מובנה — מקור, הבנת הפשט, פירוש והלכה למעשה. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: חשיבה כמעט־בוגרת; ניתוח מבוסס־מקור, טיעון מתמשך ומיומנות טקסט ראשוני; גשר אל עיון בית־מדרש — עדיין עם פיגומים ורלוונטיות. משך משוער 45–60 דק'.
when_to_use: >
  בחר תבנית זו כאשר מכינים שיעור סוגיה / גמרא כללי לתלמידי בית ספר בכיתות י–יב (גיל 15–18) — שיעור כיתתי מובנה ומותאם־גיל (ולא שיעור עיון לבני ישיבה). מתאים לרמת תיכון: שאלות ניתוח, סינתזה והערכה ברמה גבוהה; חקירה עקרונית ושורשי מחלוקת.
keywords: [גמרא, סוגיה, משנה, שקלא וטריא, רש"י, הלכה, בית ספר, תלמידים, כיתות י–יב, תיכון, גיל 15–18, הוראה מפורשת, חברותא]
structure: "המקור (משנה / גמרא) → הבנת הפשט → פירוש / מחלוקת → הדין / המסקנה → העמקה — אחרון / מבוא לחקירה"
