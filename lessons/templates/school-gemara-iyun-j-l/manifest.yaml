description: >
  שיעור עיון תלמודי (למדנות) לתלמידי בית ספר בכיתות י–יב (גיל 15–18, תיכון). העמקה בסוגיה — שאלה/חקירה, שיטות והכרעה, בהתאמת גיל. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: חשיבה כמעט־בוגרת; ניתוח מבוסס־מקור, טיעון מתמשך ומיומנות טקסט ראשוני; גשר אל עיון בית־מדרש — עדיין עם פיגומים ורלוונטיות. משך משוער 45–60 דק'.
when_to_use: >
  בחר תבנית זו כאשר מכינים שיעור עיון תלמודי (למדנות) לתלמידי בית ספר בכיתות י–יב (גיל 15–18) — שיעור כיתתי מובנה ומותאם־גיל (ולא שיעור עיון לבני ישיבה). מתאים לרמת תיכון: שאלות ניתוח, סינתזה והערכה ברמה גבוהה; חקירה עקרונית ושורשי מחלוקת.
keywords: [עיון, למדנות, חקירה, שני צדדים, תוספות, נפקא מינה, סברא, בית ספר, תלמידים, כיתות י–יב, תיכון, גיל 15–18, הוראה מפורשת, חברותא]
structure: "העמדת הסוגיה → השאלה / החקירה → שיטות הראשונים → ההכרעה והנפקא מינה → העמקה — אחרון / מבוא לחקירה"
