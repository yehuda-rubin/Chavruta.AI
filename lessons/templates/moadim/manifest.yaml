# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
id: moadim
title: "מועדים וחגים — תבנית"
genre: moadim-chagim
description: >
  שיעור על מועד או חג, המשלב מקור, טעם, הלכה, מנהג ומשמעות פנימית. תחילה מקור החג (תורה,
  נ"ך, גמרא, מגילת תענית), אחר כך טעם ומהות היום, ההלכות העיקריות של המועד, מנהגי ישראל,
  ולבסוף הפנימיות והמסר — מה החג מבקש לפעול בנפש. שילוב של הלכה ומחשבה סביב לוח השנה.
when_to_use: >
  בחר תבנית זו כאשר נושא השיעור הוא חג או מועד — פסח, שבועות, סוכות, ראש השנה, יום כיפור,
  חנוכה, פורים, תשעה באב, ט"ו בשבט, ראש חודש, ספירת העומר; כאשר השיעור משלב את הלכות
  היום עם טעמו ומשמעותו; וכאשר מבקשים להעמיק בחוויית המועד ובהכנה אליו.
keywords: [מועדים, חגים, פסח, שבועות, סוכות, ראש השנה, יום כיפור, חנוכה, פורים, תשעה באב, ספירת העומר, ראש חודש, מנהג, טעם החג, פנימיות המועד, לוח השנה]
structure: "מקור החג → טעם ומהות → הלכות עיקריות → מנהגי ישראל → פנימיות ומסר"
files:
