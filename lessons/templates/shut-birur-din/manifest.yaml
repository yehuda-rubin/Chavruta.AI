# manifest.yaml — תבנית שו"ת (mode: shut). פלט יחיד = מלל התשובה.
id: shut-birur-din
title: "שו\"ת — בירור והגדרת הדין"
genre: shut-birur-din
audience: yeshiva
grade_band: beit-midrash
age_range: "16+ — בני ישיבה / לומדי בית מדרש"
mode: shut
description: >
  תבנית תשובת שו"ת לשאלה עיונית המבקשת בירור והגדרה של דין או מושג הלכתי. מהלך התשובה: מקור
  הדין והגדרתו, שיטות הראשונים בהגדרתו, יישום הפוסקים, והמסקנה ההלכתית. הפלט הוא טקסט תשובה
  אחד שמברר את גדר הדין לעומקו, עם הפניה למקורות.
when_to_use: >
  בחר תבנית זו כאשר השאלה היא עיונית-הגדרתית ("מהו גדרו של…", "מה מקורו והגדרתו של…"), ולא
  שאלה מעשית ישירה; כשהמטרה היא לברר את מהות הדין ולא רק לפסוק מה לעשות.
keywords: [שו"ת, תשובה, בירור הדין, הגדרה, גדר, מהו, שיטות ראשונים בהגדרה, יישום, מושג הלכתי, מסקנה]
example_queries:
  - "מהו גדרו של דין זה ומה מקורו"
  - "בירור והגדרת מושג הלכתי לעומקו"
  - "מה ההגדרה המדויקת של הדין לפי הראשונים"
structure: "מקור הדין והגדרתו → שיטות הראשונים בהגדרה → יישום הפוסקים → המסקנה ההלכתית"
files:
  answer: TEMPLATE_answer.md
example_topics: ["גדר 'דבר שאינו מתכוון'", "הגדרת 'מלאכה שאינה צריכה לגופה'", "גדר 'ברירה'"]
