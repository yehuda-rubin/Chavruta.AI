description: >
  שיעור עיון תלמודי (למדנות) לתלמידי בית ספר בכיתות ז–ט (גיל 12–15, חטיבת ביניים). העמקה בסוגיה — שאלה/חקירה, שיטות והכרעה, בהתאמת גיל. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: חשיבה מופשטת מתפתחת; חשובות הרלוונטיות והזהות; יכולים להחזיק מחלוקת ואת שורשה ולטעון טענה מנומקת. משך משוער 45 דק'.
when_to_use: >
  בחר תבנית זו כאשר מכינים שיעור עיון תלמודי (למדנות) לתלמידי בית ספר בכיתות ז–ט (גיל 12–15) — שיעור כיתתי מובנה ומותאם־גיל (ולא שיעור עיון לבני ישיבה). מתאים לרמת חטיבת ביניים: שאלות ניתוח והערכה (מהו שורש המחלוקת? איזו ראיה חזקה יותר? מהי הנפקא מינה?).
