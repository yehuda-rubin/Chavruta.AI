# manifest.yaml — מטא-דאטה לאחזור התבנית ב-RAG של התבניות.
# הטקסט ב-description ו-when_to_use הוא מה שמוטמע (embedded) ומאונדקס; לפיו נבחרת התבנית
# המתאימה לשיעור חדש. (scripts/index_templates.py → Qdrant; scripts/retrieve_template.py)
id: general
title: "סוגיה והלכה — תבנית כללית"
genre: gemara-halacha
description: >
  שיעור בית-מדרש קלאסי הבנוי כסולם מקורות מסורתי: מן המקרא, דרך המשנה והגמרא ורש"י,
  אל הראשונים ונושאי הכלים, ועד השולחן ערוך ופוסקי זמננו. מתאים לבירור סוגיה תלמודית או
  לבירור הלכתי שיש בו מחלוקת שיטות, ליבון סברות, ופסק להלכה עם נפקא מינה למעשה.
when_to_use: >
  בחר תבנית זו כאשר נושא השיעור הוא סוגיית גמרא או שאלה הלכתית הנשענת על שרשרת מקורות
  מסודרת (מקרא → משנה → גמרא → ראשונים → שו"ע → פוסקים); כאשר יש מחלוקת בין תנאים/ראשונים
  או חידה הלכתית הדורשת ליבון; וכאשר המטרה היא להגיע להלכה למעשה.
keywords: [גמרא, סוגיה, הלכה, מחלוקת, תנאים, ראשונים, שולחן ערוך, פוסקים, פסק, נפקא מינה, למדנות, שבת, ברכות, מועדים]
structure: "מקרא → משנה → גמרא+רש\"י → ראשונים → נושאי כלים → שולחן ערוך → פוסקי זמננו"
files:
  source_sheet: TEMPLATE_source_sheet.md
  lesson_flow: TEMPLATE_lesson_flow.md
  full_lesson: TEMPLATE_full_lesson.md
example_topics: ["זמן קריאת שמע של ערבית", "מוקצה בשבת", "הדלקת נר חנוכה"]
example_queries:
  - "סוגיה במחלוקת תנאים וראשונים עד הפסק"
  - "בירור הלכתי משורש הדין בגמרא ועד השולחן ערוך"
  - "מחלוקת ופסק בסוגיית גמרא"
