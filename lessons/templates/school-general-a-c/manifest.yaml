grade_band: a-c
age_range: "א–ג — גיל 6–9 (יסודי צעיר)"
mode: lesson
description: >
  שיעור סוגיה / גמרא כללי לתלמידי בית ספר בכיתות א–ג (גיל 6–9, יסודי צעיר). לימוד סוגיה מובנה — מקור, הבנת הפשט, פירוש והלכה למעשה. מבנה פדגוגי (הוראה מפורשת: הדגמה → תרגול מודרך → תרגול עצמאי), מותאם לשלב ההתפתחות: חשיבה קונקרטית וקשב קצר; לומדים דרך סיפור, תמונה, תנועה ומשחק. רעיון אחד לשיעור. משך משוער 30 דק'. (הערה: ז'אנר זה נלמד בדרך כלל בשכבות בוגרות יותר; זו גרסה מותאמת ומופשטת לגיל 6–9.)
when_to_use: >
  בחר תבנית זו כאשר מכינים שיעור סוגיה / גמרא כללי לתלמידי בית ספר בכיתות א–ג (גיל 6–9) — שיעור כיתתי מובנה ומותאם־גיל (ולא שיעור עיון לבני ישיבה). מתאים לרמת יסודי צעיר: שאלות זכירה והבנה בסיסית (מה קרה? מי? היכן?) ושאלת חיבור אישית פשוטה.
keywords: [גמרא, סוגיה, משנה, שקלא וטריא, רש"י, הלכה, בית ספר, תלמידים, כיתות א–ג, יסודי צעיר, גיל 6–9, הוראה מפורשת, הצגה וסיפור]
