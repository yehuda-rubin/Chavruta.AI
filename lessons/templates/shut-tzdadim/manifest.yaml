title: "שו\"ת — צדדי היתר ואיסור"
genre: shut-tzdadim
audience: yeshiva
grade_band: beit-midrash
age_range: "16+ — בני ישיבה / לומדי בית מדרש"
mode: shut
description: >
  תבנית תשובת שו"ת לשאלה שיש בה צד היתר וצד איסור. מהלך התשובה: הגדרת הנדון ומקורו, הצגת
  צד האיסור וסברותיו, הצגת צד ההיתר וסברותיו, והכרעת הפוסקים למעשה. הפלט הוא טקסט תשובה אחד
  השוקל את שני הצדדים ומכריע, עם הפניה למקורות.
when_to_use: >
  בחר תבנית זו כאשר בשאלה יש מתח בין היתר לאיסור ("האם מותר… או אסור…", "מה סברות המתירים
  ומה סברות האוסרים"), והתשובה צריכה לשקול את שני הצדדים לפני ההכרעה.
keywords: [שו"ת, תשובה, צד היתר, צד איסור, ספק, סברות מתירים ואוסרים, שקלא וטריא, מותר או אסור, הכרעה, מחלוקת]
